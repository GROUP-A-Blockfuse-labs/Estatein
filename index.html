<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estatein</title>
    <link rel="stylesheet" href="./src/output.css" />
  </head>
  <body class="bg-[#1E1E1E] text-white">
    <!-- header/ nav-bar... -->

    <header class="flex justify-between items-center p-3 bg-[#262626]">
      <img src="./images/estatein-logo.png" alt="" class="ml-20" />
      <nav class="flex justify-center items-center gap-9">
        <a href="" class="bg-[#1E1E1E] p-2 rounded">Home</a>
        <a href="">About Us</a>
        <a href="">Properties</a>
        <a href="">Services</a>
      </nav>
      <button class="mr-20 bg-[#1E1E1E] p-2 rounded">Contact Us</button>
    </header>

    <!-- Hero section -->
    <main>
      <section class="flex justify-between">
        <div class="ml-20 space-y-5 mt-20">
          <h1 class="font-bold text-4xl">
            Discover Your Dream <br />
            Property with Estatein
          </h1>
          <p>
            Your journey to finding the perfect property begins here.  Explore
            our listings <br> to find the home  that matches your dreams.
          </p>

          <div class="flex gap-3">
            <button class="p-2 rounded border-[#262626] border-2">
              Learn More
            </button>
            <button class="bg-[#703BF7] p-1 rounded">Browse Properties</button>
          </div>
          <div class="flex justify-baseline items-center gap-4">
            <div class="bg-[#262626] p-8">
              <span class="font-bold text-2xl">200+</span>
              <p class="text-[14px]">Happy Customers</p>
            </div>
            <div class="bg-[#262626] p-8">
              <span class="font-bold text-2xl">10K+</span>
              <p class="text-[14px]">Properties For Clients</p>
            </div>

            <div class="bg-[#262626] p-8">
              <span class="font-bold text-2xl">16+</span>
              <p class="text-[14px]">Years of Experience</p>
            </div>
          </div>
        </div>
        <div class="">
          <img src="./images/estatein-bg.png" alt="" class="h-137.5 " />
        </div>
      </section>
      <div class="absolute bottom-80 left-160">
        <img src="./images/Sub Container-bg.png" alt="" class="w-32" />
      </div>
    </main>
  </body>
</html>
